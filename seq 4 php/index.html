<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur de Profil</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 800px; margin: 50px auto; background: #fff; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; }
    form { display: flex; flex-direction: column; }
    label { margin-top: 10px; }
    input, textarea { padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
    input[type="submit"] { margin-top: 20px; background: #28a745; color: #fff; border: none; cursor: pointer; }
    input[type="submit"]:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Création de Profil</h1>
    <form action="profil.php" method="post">
      <label for="nom">Nom :</label>
      <input type="text" id="nom" name="nom" required>
      <label for="prenom">Prénom :</label>
      <input type="text" id="prenom" name="prenom" required>
      <label for="age">Âge :</label>
      <input type="number" id="age" name="age" required>
      <label for="email">Email :</label>
      <input type="email" id="email" name="email" required>
      <label for="tel">Téléphone :</label>
      <input type="text" id="tel" name="tel">
      <label for="profession">Profession :</label>
      <input type="text" id="profession" name="profession">
      <label for="hobbies">Hobbies :</label>
      <input type="text" id="hobbies" name="hobbies">
      <label for="bio">Biographie :</label>
      <textarea id="bio" name="bio" rows="5"></textarea>
      <input type="submit" value="Créer le Profil">
    </form>
  </div>
</body>
</html>
